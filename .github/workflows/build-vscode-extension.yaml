name: Build VS Code Extension

on:
  push:
    branches: [main]
    paths:
      - 'vscode-extension/**'
      - 'backend/**'
  pull_request:
    paths:
      - 'vscode-extension/**'
      - 'backend/**'

jobs:
  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install napi-rs CLI
        run: npm install -g @napi-rs/cli

      - name: Set cross-compilation env (macOS x86_64)
        if: matrix.target == 'x86_64-apple-darwin'
        run: |
          echo "CARGO_TARGET_X86_64_APPLE_DARWIN_LINKER=clang" >> $GITHUB_ENV
          echo "CC_x86_64_apple_darwin=clang" >> $GITHUB_ENV
          echo "CXX_x86_64_apple_darwin=clang++" >> $GITHUB_ENV
          echo "SDKROOT=$(xcrun --show-sdk-path)" >> $GITHUB_ENV
          echo "MACOSX_DEPLOYMENT_TARGET=10.15" >> $GITHUB_ENV

      - name: Build native addon
        working-directory: vscode-extension/native
        run: napi build --platform --release --target ${{ matrix.target }}

      - name: Upload native addon
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.target }}
          path: vscode-extension/native/tanglit.*.node

  package:
    needs: build-native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download all native addons
        uses: actions/download-artifact@v4
        with:
          path: vscode-extension/native/
          merge-multiple: true

      - name: Install dependencies
        working-directory: vscode-extension
        run: npm install

      - name: Build TypeScript
        working-directory: vscode-extension
        run: npx tsc

      - name: Package extension
        working-directory: vscode-extension
        run: npx vsce package --no-dependencies

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: tanglit-vscode
          path: vscode-extension/*.vsix
